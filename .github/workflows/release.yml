name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Run tests
        run: dotnet test KARTCompanion.Tests/KARTCompanion.Tests.csproj -c Release

      - name: Publish self-contained single-file exe
        run: dotnet publish KARTCompanion/KARTCompanion.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish

      - name: Rename artifact
        shell: bash
        run: mv publish/KARTCompanion.exe "KART-Companion-win-x64-${{ steps.version.outputs.VERSION }}.exe"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          files: "KART-Companion-win-x64-${{ steps.version.outputs.VERSION }}.exe"
          draft: false
          prerelease: false
